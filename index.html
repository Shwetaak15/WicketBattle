<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏏 Cricket Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1>🏏 Cricket Battle</h1>
    <p class="subtitle">Choose your move and defeat the computer!</p>

    <div class="choices">

        <button class="choice-button" onclick="playGame('Bat')">
            <img src="https://4.imimg.com/data4/VJ/MX/MY-24846209/cricket-bats.jpg"
                 alt="Bat"
                 class="choice-image">
        </button>

        <button class="choice-button" onclick="playGame('Ball')">
            <img src="https://tse1.mm.bing.net/th/id/OIP.T0Yx_4R0RTYosajx6PMv8wHaHa?pid=Api&h=220&P=0"
                 alt="Ball"
                 class="choice-image">
        </button>

        <button class="choice-button" onclick="playGame('Stump')">
            <img src="https://tse4.mm.bing.net/th/id/OIP.ReVpT_YGKxCiBLKL0zFaQAHaR-?pid=Api&h=220&P=0"
                 alt="Stump"
                 class="choice-image">
        </button>

    </div>

    <div class="result-card">
        <h3 id="user-move"></h3>
        <h3 id="computer-move"></h3>
        <h2 id="result"></h2>
    </div>

    <div class="score-card">
        <h2>📊 Score Board</h2>
        <h3 id="score"></h3>
    </div>

    <button class="reset-btn" onclick="localStorage.clear(); resetScore();">
        🔄 Reset Game
    </button>

</div>

<script>

let scoreStr = localStorage.getItem('Score');
let score;

resetScore(scoreStr);

function playGame(userMove) {
    let computerChoice = generateComputerChoice();
    let resultMsg = getResult(userMove, computerChoice);
    showResult(userMove, computerChoice, resultMsg);
}

function resetScore(scoreStr) {

    score = scoreStr ? JSON.parse(scoreStr) : {
        win: 0,
        lost: 0,
        tie: 0
    };

    score.displayScore = function() {
        return `Won: ${this.win} | Lost: ${this.lost} | Tie: ${this.tie}`;
    };

    showResult();
}

function generateComputerChoice() {

    let randomNumber = Math.random() * 3;

    if (randomNumber <= 1) {
        return 'Bat';
    }
    else if (randomNumber <= 2) {
        return 'Ball';
    }
    else {
        return 'Stump';
    }
}

function getResult(userMove, computerMove) {

    if (userMove === 'Bat') {

        if (computerMove === 'Bat') {
            score.tie++;
            return "🤝 It's a Tie";
        }

        if (computerMove === 'Ball') {
            score.win++;
            return "🎉 You Won";
        }

        score.lost++;
        return "😢 Computer Won";
    }

    if (userMove === 'Ball') {

        if (computerMove === 'Ball') {
            score.tie++;
            return "🤝 It's a Tie";
        }

        if (computerMove === 'Stump') {
            score.win++;
            return "🎉 You Won";
        }

        score.lost++;
        return "😢 Computer Won";
    }

    if (userMove === 'Stump') {

        if (computerMove === 'Stump') {
            score.tie++;
            return "🤝 It's a Tie";
        }

        if (computerMove === 'Bat') {
            score.win++;
            return "🎉 You Won";
        }

        score.lost++;
        return "😢 Computer Won";
    }
}

function showResult(userMove, computerMove, resultMsg) {

    localStorage.setItem('Score', JSON.stringify(score));

    document.querySelector('#user-move').innerText =
        userMove ? `👤 You chose: ${userMove}` : '';

    document.querySelector('#computer-move').innerText =
        computerMove ? `🤖 Computer chose: ${computerMove}` : '';

    document.querySelector('#result').innerText =
        resultMsg || '';

    document.querySelector('#score').innerText =
        score.displayScore();
}

</script>

</body>
</html>
